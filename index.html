<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر كوزمتك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --pink: #880e4f;
            --accent: #ad1457;
            --bg: #eef1f6;
            --card: #ffffff;
            --text: #222;
            --muted: #777;
        }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body {
            background: var(--bg);
            margin: 0;
            padding-bottom: 24px;
            color: var(--text);
            overflow-x: hidden;
        }
        header {
            background: var(--pink);
            color: white;
            padding: 8px 14px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 8px 30px rgba(136, 14, 79, 0.15);
        }
        .header-inner {
            display: flex;
            flex-flow: row wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            min-height: 66px;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .header-actions { order: 2; min-width: 0; overflow-x: hidden; scroll-behavior: smooth; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; justify-content: flex-end; }
        .header-actions input {
            width: 220px;
            max-width: 220px;
            min-width: 120px;
            padding: 10px 12px;
            border-radius: 14px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 14px;
            min-width: 0;
        }
        .brand { order: 1; }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-logo {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            object-fit: cover;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.24);
            padding: 0;
            display: block;
        }
        .brand-text strong {
            display: block;
            font-size: 22px;
            letter-spacing: 0.3px;
            color: white;
        }
        /* Modern button base */
        .btn {
            border: none;
            border-radius: 14px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 800;
            transition: transform .14s ease, box-shadow .14s ease, opacity .14s ease;
            box-shadow: 0 8px 20px rgba(82,63,105,0.08);
        }
        .btn:active { transform: translateY(1px); }
        .btn-primary { background: var(--pink); color: white; }
        .icon-btn { width:46px; height:46px; border-radius:12px; }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
            justify-content: flex-end;
            direction: ltr;
        }
        .icon-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.28);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.14);
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: transform .2s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
        }
        .add-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.28);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.18);
            color: white;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .2s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            padding: 0;
        }
        .icon-btn:hover,
        .add-btn:hover {
            background: rgba(255,255,255,0.28);
            transform: translateY(-1px);
            border-color: rgba(255,255,255,0.45);
            box-shadow: 0 10px 24px rgba(0,0,0,0.12);
        }
        .modal-close {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.95);
            color: var(--pink);
            font-size: 22px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .modal-close:hover {
            background: white;
        }
        .message-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
            filter: invert(1) brightness(1.3) contrast(1);
        }
        .profile-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: contain;
            border: 1px solid rgba(255,255,255,0.3);
            background: white;
            padding: 4px;
        }
        .header-actions .icon-label {
            display: none;
        }
        .hero {
            padding: 0;
        }
        .hero-card {
            background: linear-gradient(135deg, rgba(136,14,79,.95), rgba(173,20,87,.95));
            border-radius: 28px;
            padding: 22px 20px;
            color: white;
            box-shadow: 0 20px 50px rgba(136, 14, 79, 0.16);
            margin-bottom: 14px;
            overflow: hidden;
        }
        .hero-card h1 {
            margin: 0 0 10px;
            font-size: 26px;
            line-height: 1.2;
        }
        .hero-card p {
            margin: 0;
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            line-height: 1.6;
        }
        /* Categories UI removed per user request */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            justify-content: center;
            gap: 14px;
            padding: 0 12px 90px;
        }
        .card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(82, 63, 105, 0.08);
            transition: transform .3s ease, box-shadow .3s ease;
            border: 1px solid rgba(0,0,0,0.04);
            width: 100%;
            max-width: 220px;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 26px 55px rgba(82, 63, 105, 0.12);
        }
        .card-image {
            position: relative;
            overflow: hidden;
            height: 220px;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .4s ease;
        }
        .card:hover .card-image img {
            transform: scale(1.06);
        }
        .card-admin {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
            z-index: 2;
        }
        .admin-btn {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.35);
            color: white;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .2s ease, transform .2s ease;
        }
        .admin-btn:hover {
            background: rgba(0,0,0,0.55);
            transform: translateY(-1px);
        }
        .card-body {
            padding: 12px;
        }
        .card-title {
            margin: 0 0 4px;
            font-size: 15px;
            font-weight: 900;
            line-height: 1.3;
            min-height: auto;
            color: #222;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 0;
        }
        .price-tag {
            color: var(--pink);
            font-size: 15px;
            font-weight: 800;
        }
        .status-pill {
            background: rgba(232, 30, 82, 0.08);
            color: #b91c5d;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
        }
        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .card-actions button {
            border: none;
            background: var(--pink);
            color: white;
            border-radius: 16px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            font-size: 13px;
        }
        .card-actions .secondary {
            background: #f5f5f5;
            color: var(--text);
        }
        .card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255,255,255,0.92);
            color: #333;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.38) 100%);
        }
        .card-overlay span {
            color: white;
            font-size: 12px;
            font-weight: 700;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.68);
            z-index: 2000;
            justify-content: flex-start;
            padding: 42px 16px 16px;
        }
        .modal-box {
            background: white;
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            border-radius: 28px;
            padding: 24px;
            max-height: calc(100vh - 88px);
            overflow-y: auto;
        }
        input, textarea, select {
            width: 100%;
            margin-top: 12px;
            padding: 14px 16px;
            border: 1px solid #ececec;
            border-radius: 16px;
            font-size: 14px;
            outline: none;
            background: #fafafa;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn-pub {
            background: var(--pink);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            margin-top: 20px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: row;
                align-items: center;
                gap: 10px;
                overflow-x: hidden;
                flex-wrap: nowrap;
            }
            .header-actions {
                width: auto;
                justify-content: flex-start;
                flex: 1 1 auto;
                min-width: 0;
                gap: 6px;
            }
            .header-actions input {
                width: 100px;
                max-width: 100px;
                min-width: 0;
                flex: 0 0 auto;
            }
            .icon-btn,
            .add-btn {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                padding: 0;
                background: rgba(255,255,255,0.18);
                box-shadow: none;
                border-color: rgba(255,255,255,0.18);
            }
            .icon-btn img,
            .add-btn img {
                width: 20px;
                height: 20px;
            }
            .brand {
                flex-shrink: 1;
                min-width: 0;
            }
            .brand-logo {
                width: 40px;
                height: 40px;
            }
            .brand-text strong {
                font-size: 16px;
            }
            .card-actions {
                flex-direction: column;
            }
            .card-actions button {
                width: 100%;
            }
            #grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                padding: 0 12px 110px;
            }
        }
        @media (max-width: 480px) {
            .brand-logo {
                width: 56px;
                height: 56px;
            }
            .brand-text strong {
                font-size: 16px;
            }
            .header-actions button,
            .header-actions a {
                min-width: unset;
                padding: 10px 12px;
                font-size: 13px;
                height: 40px;
            }
            .card-image {
                height: 150px;
            }
            .card-meta {
                flex-direction: column;
                align-items: flex-start;
            }
        }
        #detailsScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 3000;
            overflow-y: auto;
        }
        .slider {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            height: 360px;
            max-height: 50vh;
            width: 100%;
            background: #000;
            scroll-snap-type: x mandatory;
            position: relative;
            border-bottom-left-radius: 32px;
            border-bottom-right-radius: 32px;
            align-items: center;
        }
        .slider img {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            scroll-snap-align: center;
            background: #000;
        }
        .details-close {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 10;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.95);
            color: var(--pink);
            font-size: 24px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }
        .details-close:hover {
            background: white;
        }
        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 0 6px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: width .3s ease, background .3s ease;
        }
        .dot.active {
            background: var(--pink);
            width: 22px;
            border-radius: 999px;
        }
        .v-body {
            padding: 24px;
            border-radius: 32px 32px 0 0;
            background: #fff;
            margin-top: -28px;
            position: relative;
            box-shadow: 0 -18px 45px rgba(82, 63, 105, 0.12);
        }
        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .details-header .status-pill {
            margin-bottom: 14px;
        }
        .details-header h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 900;
            line-height: 1.15;
        }
        .details-price {
            color: var(--pink);
            font-size: 24px;
            font-weight: 900;
            text-align: right;
            white-space: nowrap;
        }
        .details-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }
        .detail-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 16px;
            border: 1px solid rgba(136,14,79,0.12);
            background: rgba(136,14,79,0.06);
            color: var(--pink);
            font-weight: 700;
            text-decoration: none;
            transition: background .2s ease, transform .2s ease;
        }
        .detail-link a:hover {
            background: rgba(136,14,79,0.1);
        }
        .detail-owner-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
        }
        .detail-owner-link:hover .detail-note {
            background: rgba(248,248,248,0.95);
        }
        .owner-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(0,0,0,0.08);
            background: #fff;
        }
        #vPhone,
        #vWhatsapp {
            display: none;
        }
        .detail-note {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.08);
            background: #f8f8f8;
            color: #333;
            font-size: 14px;
            font-weight: 600;
        }
        .details-text {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #444;
            font-size: 15px;
            margin-bottom: 18px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 14px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
            border-top: 1px solid #eee;
        }
        .btn-act {
            text-align: center;
            padding: 14px 12px;
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="header-actions">
            <button class="icon-btn" id="profileBtn" onclick="openProfile()" title="الملف الشخصي">
                <img id="navProfileImg" src="https://via.placeholder.com/44" alt="صورة المستخدم" class="profile-icon">
            </button>
            <button class="icon-btn" onclick="location.href='inbox.html'" title="الرسائل" style="position:relative;">
                <img src="https://cdn-icons-png.flaticon.com/512/589/589708.png" alt="رسائل" class="message-icon">
                <span id="msgDot" style="display:none; position:absolute; top:6px; right:6px; width:10px; height:10px; border-radius:50%; background:#ff3b30; box-shadow:0 0 0 2px rgba(255,255,255,0.9);"></span>
            </button>
            <button class="icon-btn" id="searchToggle" title="بحث" onclick="toggleSearch()" aria-expanded="false">
                <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" alt="بحث" style="width:22px; height:22px; filter:invert(1);">
            </button>
            <input id="searchInput" type="search" placeholder="بحث..." oninput="applySearch()" style="display:none;">
            <button class="add-btn" onclick="openPop()" title="إضافة منتج">+</button>
        </div>
        <div class="brand" onclick="goHome()" style="cursor:pointer;">
            <img src="https://l.top4top.io/p_3771dubid0.png" alt="شعار كوزمتك" class="brand-logo">
            <div class="brand-text"><strong>متجر كوزمتك</strong></div>
        </div>
    </div>
</header>

<!-- Categories UI removed -->

<div id="grid"></div>

<div class="modal" id="addPop" onclick="if(event.target.id==='addPop') hideModal()">
    <div class="modal-box">
        <button class="modal-close" onclick="hideModal()">×</button>
        <h3 id="popTitle" style="text-align:center; color:var(--pink);">نشر منتج جديد</h3>
        <input type="file" id="pCover" accept="image/*" multiple onchange="previewFile(this)">
        <img id="prev" style="width:80px; height:80px; object-fit:cover; display:none; margin:10px auto; border-radius:10px; border:2px solid var(--pink);">
        <input type="file" id="pAlbum" accept="image/*" multiple onchange="document.getElementById('cText').innerText='تم اختيار '+this.files.length+' صور'">
        <span id="cText" style="font-size:12px; color:var(--pink); font-weight:700;"></span>
        <input type="text" id="pTitle" placeholder="اسم المنتج *">
        <div style="display:flex; gap:10px;">
            <input type="number" id="pPrice" placeholder="السعر (اختياري)">
            <select id="pCurrency" style="width:100px;"><option value="د.ع">د.ع</option><option value="$">$</option></select>
        </div>
        <textarea id="pDesc" placeholder="تفاصيل المنتج..."></textarea>
        <input type="url" id="pContact" placeholder="رابط التواصل">
        <select id="pStatus"><option value="متوفر">متوفر</option><option value="نفذت الكمية">نفذت الكمية</option></select>
        <input type="tel" id="pPhone" placeholder="رقم الاتصال">
        <input type="tel" id="pWhatsapp" placeholder="رقم الواتساب">
        <button class="btn-pub" id="btnPub" onclick="publish()">حفظ البيانات</button>
        <button onclick="window.history.back()" style="width:100%; border:none; background:none; color:gray; margin-top:10px; font-weight:bold;">إلغاء</button>
    </div>
</div>

<div id="detailsScreen">
    <div class="slider" id="vSlider"></div>
    <button class="details-close" onclick="closeDetails()">×</button>
    <div class="dots" id="vDots"></div>
    <div class="v-body">
        <div class="details-header">
            <div>
                <div id="vStatus" class="status-pill"></div>
                <h2 id="vTitle"></h2>
            </div>
            <div id="vPrice" class="details-price"></div>
        </div>
        <div id="vDesc" class="details-text"></div>
        <div class="details-owner" style="display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-bottom:18px;">
            <a id="ownerProfileLink" href="#" class="detail-owner-link" style="display:none;">
                <img id="ownerAvatar" src="https://via.placeholder.com/150/ffffff/880e4f?text=ص" alt="صورة البائع" class="owner-avatar">
                <span id="vOwner" class="detail-note"></span>
            </a>
        </div>
        <div class="details-meta">
            <span id="vContact" class="detail-link"></span>
            <span id="vPhone" class="detail-note"></span>
            <span id="vWhatsapp" class="detail-note"></span>
        </div>
    </div>
    <div class="bottom-nav">
        <a id="linkContact" href="#" class="btn-act" style="background:#ff6f61; display:none;">رابط التواصل</a>
        <a id="linkWa" href="" class="btn-act" style="background:#25d366;">واتساب</a>
        <a id="linkPh" href="" class="btn-act" style="background:#007bff;">اتصال</a>
        <a id="linkSocial" href="#" class="btn-act" style="background:var(--pink);">مراسلة</a>
    </div>
</div>

<script>
    const userPhone = localStorage.getItem('app_user_phone');
    if (!userPhone) {
        location.href = 'login.html';
        throw new Error('المستخدم غير مسجل الدخول');
    }

    const config = { databaseURL: "https://cosmetic-1980-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();
    let currentEditId = null;
    let globalSettings = {};
    let productsCache = [];
    let activeCategory = 'all';
    let searchQuery = '';

    const savedProfile = (() => {
        try {
            return JSON.parse(localStorage.getItem('alfaham_profile') || '{}');
        } catch (e) {
            return {};
        }
    })();

    const navProfile = document.getElementById('navProfileImg');
    if (navProfile) {
        navProfile.src = savedProfile.img || 'https://via.placeholder.com/44/880e4f/ffffff?text=%D8%B5';
        navProfile.onerror = () => {
            navProfile.src = 'https://via.placeholder.com/44/880e4f/ffffff?text=%D8%B5';
        };
    }

    db.ref('users/' + userPhone).on('value', snap => {
        const userData = snap.val() || {};
        if (navProfile) {
            navProfile.src = userData.img || savedProfile.img || 'https://via.placeholder.com/44/880e4f/ffffff?text=%D8%B5';
        }
    });

    function applySearch() {
        searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
        renderProducts();
    }

    function setCategory(category) {
        activeCategory = category;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === category));
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const filtered = productsCache.filter(d => {
            const matchesCategory = activeCategory === 'all' || (d.status && d.status === activeCategory) || (activeCategory === 'عروض' && d.status && d.status.toLowerCase().includes('عرض'));
            const matchesSearch = !searchQuery || (d.title && d.title.toLowerCase().includes(searchQuery)) || (d.desc && d.desc.toLowerCase().includes(searchQuery));
            return matchesCategory && matchesSearch;
        });

        if (!filtered.length) {
            grid.innerHTML = '<div style="grid-column:1/-1; padding: 40px 20px; text-align:center; color:#555;">عذرًا، لا توجد منتجات مطابقة للبحث</div>';
            return;
        }

        filtered.forEach(d => {
            const id = d.key;
            const card = document.createElement('div');
            card.className = 'card';
            const statusText = d.status || 'متوفر';
            const priceText = d.price ? `${d.price} ${d.currency || 'د.ع'}` : 'سعر حسب الطلب';
            let adminBtns = '';
            if (d.owner === userPhone) {
                adminBtns = `
                    <div class="card-admin">
                        <button class="admin-btn del-btn" onclick="event.stopPropagation(); deleteItem('${id}')">✕</button>
                        <button class="admin-btn edit-btn" onclick="event.stopPropagation(); openPop('${id}')">✎</button>
                    </div>
                `;
            }
            card.innerHTML = `
                <div class="card-image">
                    <img src="${d.image || 'https://via.placeholder.com/400x300?text=منتج'}" loading="lazy" alt="صورة المنتج">
                    ${adminBtns}
                    <div class="card-overlay"><span>${statusText}</span></div>
                </div>
                <div class="card-body">
                    <h3 class="card-title">${d.title || 'منتج بدون اسم'}</h3>
                    <div class="card-meta">
                        <span class="price-tag">${priceText}</span>
                    </div>
                </div>`;
            card.onclick = () => openDetails(id);
            const img = card.querySelector('img');
            if (img) img.onclick = () => openDetails(id);
            grid.prepend(card);
        });
    }

    db.ref('products').on('value', snap => {
        productsCache = [];
        snap.forEach(child => {
            const data = child.val();
            data.key = child.key;
            productsCache.push(data);
        });
        renderProducts();
    });

    // مراقبة الرسائل الجديدة للتنبيه
    db.ref('chats').on('value', snap => {
        let hasNew = false;
        snap.forEach(child => {
            const chat = child.val();
            if (chat.receiver === userPhone && chat.unread === true) hasNew = true;
        });
        document.getElementById('msgDot').style.display = hasNew ? 'block' : 'none';
    });

    async function publish() {
        const btn = document.getElementById('btnPub');
        const title = document.getElementById('pTitle').value;
        if(!title) return alert("الاسم مطلوب");
        btn.disabled = true; btn.innerText = "جاري الحفظ...";
        let obj = {
            title,
            price: document.getElementById('pPrice').value,
            currency: document.getElementById('pCurrency').value,
            desc: document.getElementById('pDesc').value,
            contactLink: document.getElementById('pContact').value,
            status: document.getElementById('pStatus').value,
            phone: document.getElementById('pPhone').value,
            whatsapp: document.getElementById('pWhatsapp').value,
            owner: userPhone,
            time: Date.now()
        };
        const coverFiles = Array.from(document.getElementById('pCover').files || []);
        const albumFiles = Array.from(document.getElementById('pAlbum').files || []);
        const allFiles = [...coverFiles, ...albumFiles];
        if (allFiles.length) {
            const processedImages = await Promise.all(allFiles.map(processImg));
            obj.image = processedImages[0];
            obj.album = processedImages;
        }
        const ref = currentEditId ? db.ref('products/' + currentEditId) : db.ref('products').push();
        ref.update(obj).then(() => { btn.disabled = false; hideModal(); });
    }

    function processImg(file) {
        return new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const s = 600 / img.width; c.width = 600; c.height = img.height * s;
                    c.getContext('2d').drawImage(img, 0, 0, 600, c.height);
                    res(c.toDataURL('image/jpeg', 0.7));
                }
            }
        });
    }

    function deleteItem(id) { if(confirm('حذف؟')) db.ref('products/' + id).remove(); }

    function openDetails(id) {
        db.ref('products/' + id).once('value', snap => {
            const data = snap.val();
            const s = document.getElementById('vSlider'); const dots = document.getElementById('vDots');
            s.innerHTML = ''; dots.innerHTML = '';
            const imgs = data.album || [data.image];
            imgs.forEach((img, i) => {
                s.innerHTML += `<img src="${img}">`;
                dots.innerHTML += `<div class="dot ${i==0?'active':''}"></div>`;
            });
            s.onscroll = () => {
                const idx = Math.round(s.scrollLeft / s.offsetWidth);
                document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i == idx));
            };
            document.getElementById('vTitle').innerText = data.title;
            document.getElementById('vPrice').innerText = data.price ? data.price + " " + data.currency : "";
            document.getElementById('vContact').innerHTML = data.contactLink ? `<a href="${data.contactLink}" target="_blank" rel="noopener noreferrer">رابط التواصل</a>` : '';
            document.getElementById('vPhone').innerText = data.phone ? `الهاتف: ${data.phone}` : '';
            document.getElementById('vWhatsapp').innerText = data.whatsapp ? `واتساب: ${data.whatsapp}` : '';
            document.getElementById('vDesc').innerText = data.desc;
            const st = document.getElementById('vStatus');
            st.innerText = data.status; st.style.background = data.status=="متوفر"?"#e8f5e9":"#ffebee"; st.style.color = data.status=="متوفر"?"#2e7d32" : "#c62828";
            
            const linkContact = document.getElementById('linkContact');
            const linkWa = document.getElementById('linkWa');
            const linkPh = document.getElementById('linkPh');
            const linkSocial = document.getElementById('linkSocial');

            if (data.contactLink) {
                linkContact.style.display = 'inline-flex';
                linkContact.href = data.contactLink;
                linkContact.target = '_blank';
                linkContact.rel = 'noopener noreferrer';
            } else {
                linkContact.style.display = 'none';
                linkContact.href = '#';
            }

            if (data.whatsapp) {
                linkWa.style.display = 'inline-flex';
                linkWa.href = "https://wa.me/" + data.whatsapp;
            } else {
                linkWa.style.display = 'none';
                linkWa.href = '#';
            }

            if (data.phone) {
                linkPh.style.display = 'inline-flex';
                linkPh.href = "tel:" + data.phone;
            } else {
                linkPh.style.display = 'none';
                linkPh.href = '#';
            }

            const ownerNameElem = document.getElementById('vOwner');
            const ownerAvatar = document.getElementById('ownerAvatar');
            const ownerProfileLink = document.getElementById('ownerProfileLink');
            ownerNameElem.innerText = 'البائع: جاري التحميل...';
            ownerAvatar.src = 'https://via.placeholder.com/150/ffffff/880e4f?text=ص';
            ownerProfileLink.style.display = 'none';

            const isOwner = data.owner && String(data.owner) === String(userPhone);
            const chatTarget = data.owner || data.whatsapp || data.phone;
            const canChat = chatTarget && chatTarget !== userPhone;
            linkSocial.style.display = canChat ? 'inline-flex' : 'none';
            linkSocial.href = '#';

            if (data.owner) {
                const profileHref = isOwner ? 'profile.html' : `profile.html?id=${encodeURIComponent(data.owner)}`;
                db.ref('users/' + data.owner).once('value', ownerSnap => {
                    const ownerData = ownerSnap.val() || {};
                    const ownerName = isOwner ? 'أنت' : (ownerData.name || ownerData.store || data.owner);
                    ownerNameElem.innerText = `البائع: ${ownerName}`;
                    ownerAvatar.src = ownerData.img || 'https://via.placeholder.com/150/ffffff/880e4f?text=ص';
                    ownerProfileLink.href = profileHref;
                    ownerProfileLink.removeAttribute('target');
                    ownerProfileLink.removeAttribute('rel');
                    ownerProfileLink.style.display = 'inline-flex';
                });
            } else {
                ownerNameElem.innerText = 'البائع: غير محدد';
            }

            linkSocial.onclick = function(e) {
                e.preventDefault();
                if (!canChat) return;
                const chatId = userPhone < chatTarget ? userPhone + "_" + chatTarget : chatTarget + "_" + userPhone;
                db.ref('chats/' + chatId).update({ receiver: chatTarget, unread: true });
                location.href = `chat.html?chatId=${chatId}&receiver=${chatTarget}`;
            };

            document.getElementById('detailsScreen').style.display = 'block';
            window.location.hash = `product=${encodeURIComponent(id)}`;
        });
    }

    function closeDetails() {
        document.getElementById('detailsScreen').style.display = 'none';
        if (window.location.hash.startsWith('#product=')) {
            history.replaceState(null, '', window.location.pathname + window.location.search);
        } else {
            window.history.back();
        }
    }

    function restoreDetailsFromHash() {
        const hash = window.location.hash || '';
        const match = hash.match(/^#product=(.+)/);
        if (match && match[1]) {
            openDetails(decodeURIComponent(match[1]));
        }
    }

    function openPop(id = null) {
        if (id) {
            currentEditId = id;
            document.getElementById('popTitle').innerText = "تعديل المنتج";
            db.ref('products/' + id).once('value', snap => {
                const d = snap.val();
                document.getElementById('pTitle').value = d.title || '';
                document.getElementById('pPrice').value = d.price || '';
                document.getElementById('pCurrency').value = d.currency || 'د.ع';
                document.getElementById('pDesc').value = d.desc || '';
                document.getElementById('pContact').value = d.contactLink || '';
                document.getElementById('pStatus').value = d.status || 'متوفر';
                document.getElementById('pPhone').value = d.phone || '';
                document.getElementById('pWhatsapp').value = d.whatsapp || '';
                document.getElementById('prev').src = d.image;
                document.getElementById('prev').style.display = 'block';
                document.getElementById('cText').innerText = d.album ? 'تم اختيار ' + d.album.length + ' صور' : '';
            });
        } else {
            currentEditId = null;
            document.getElementById('popTitle').innerText = "نشر منتج جديد";
            document.querySelectorAll('#addPop input:not([type="file"]), #addPop textarea').forEach(i => i.value = '');
            document.getElementById('pCover').value = '';
            document.getElementById('pAlbum').value = '';
            document.getElementById('pContact').value = '';
            document.getElementById('cText').innerText = '';
            document.getElementById('prev').style.display = 'none';
        }
        document.getElementById('addPop').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        window.history.pushState({p:1}, '');
    }

    function hideModal() {
        document.getElementById('addPop').style.display = 'none';
        document.body.style.overflow = 'auto';
        currentEditId = null;
    }

    window.onpopstate = () => {
        document.querySelectorAll('.modal, #detailsScreen').forEach(m => m.style.display='none');
        document.body.style.overflow = 'auto';
    };

    window.addEventListener('load', restoreDetailsFromHash);

    function previewFile(i) {
        const files = Array.from(i.files || []);
        const p = document.getElementById('prev');
        if (!files.length) {
            p.style.display = 'none';
            document.getElementById('cText').innerText = '';
            return;
        }
        const firstFile = files[0];
        const r = new FileReader();
        r.onload = e => {
            p.src = e.target.result;
            p.style.display = 'block';
        };
        r.readAsDataURL(firstFile);
        if (files.length > 1) {
            document.getElementById('cText').innerText = 'تم اختيار ' + files.length + ' صور';
        } else {
            document.getElementById('cText').innerText = '';
        }
    }

    function toggleSearch(show) {
        const input = document.getElementById('searchInput');
        const btn = document.getElementById('searchToggle');
        const isVisible = input.style.display !== 'none' && input.style.display !== '';
        if (typeof show === 'undefined') show = !isVisible;
        if (show) {
            input.style.display = 'block';
            btn.setAttribute('aria-expanded', 'true');
            setTimeout(() => input.focus(), 10);
        } else {
            input.style.display = 'none';
            btn.setAttribute('aria-expanded', 'false');
            input.value = '';
            applySearch();
        }
    }

    document.addEventListener('click', function(e){
        const ha = document.querySelector('.header-actions');
        const input = document.getElementById('searchInput');
        if (!ha.contains(e.target) && input && input.style.display === 'block') {
            toggleSearch(false);
        }
    });

    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') toggleSearch(false); });

    function openProfile() {
        if (!userPhone) {
            location.href = 'login.html';
            return;
        }

        db.ref('users/' + userPhone).once('value').then(snap => {
            const data = snap.val() || {};
            try { localStorage.setItem('prefetched_profile', JSON.stringify(data)); } catch (e) { console.error(e); }
            location.href = 'profile.html';
        }).catch(err => {
            console.error(err);
            location.href = 'profile.html';
        });
    }

    function goHome() {
        if (window.location.pathname.endsWith('index.html') || window.location.pathname.endsWith('/') || window.location.pathname === '') {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            location.href = 'index.html';
        }
    }
</script>
</body>
</html>
