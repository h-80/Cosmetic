<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة المتجر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --pink: #880e4f; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background: #f0f0f0; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* شاشة البداية / الهيدر الأصلي */
        header { background: var(--pink); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* منطقة المحادثة - فقاعات نظيفة */
        #chatBox { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* فقاعة المستخدم (الطرف الأول) */
        .msg.user { background: white; align-self: flex-start; border-bottom-left-radius: 2px; color: #333; }
        
        /* فقاعة الإدارة (الطرف الثاني) */
        .msg.admin { background: #fce4ec; align-self: flex-end; border-bottom-right-radius: 2px; color: #333; border: 1px solid #f8bbd0; }

        /* منطقة الإدخال */
        .input-area { background: white; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        .input-area button { background: var(--pink); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<header id="chatHeader">محادثة الدعم الفني</header>

<div id="chatBox"></div>

<div class="input-area">
    <input type="text" id="userMsg" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">✈</button>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = { databaseURL: "https://cosmetic-1980-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // جلب رقم الهاتف (المعرف) من النظام
    const userPhone = localStorage.getItem('userPhone') || "077XXXXXXXX"; 

    function loadMessages() {
        const chatBox = document.getElementById('chatBox');
        
        // الاستماع للتغييرات في مسار المحادثة الخاص بهذا المستخدم
        db.ref('chats/' + userPhone).on('value', (snapshot) => {
            chatBox.innerHTML = ''; 
            
            snapshot.forEach((child) => {
                const data = child.val();
                
                // استخراج النص بذكاء لمنع ظهور الأرقام أو الأخطاء
                let text = "";
                if (typeof data === 'object') {
                    text = data.text || data.msg || "";
                } else if (typeof data === 'string' && data !== userPhone) {
                    text = data;
                }

                if (text && text !== "[object Object]") {
                    const div = document.createElement('div');
                    // تمييز الرسائل: إذا كان الحقل role هو admin أو sender هو الإدارة
                    const isFromAdmin = (data.role === 'admin');
                    div.className = `msg ${isFromAdmin ? 'admin' : 'user'}`;
                    div.innerText = text;
                    chatBox.appendChild(div);
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function sendMessage() {
        const input = document.getElementById('userMsg');
        const text = input.value.trim();
        if (text === "") return;

        // الإرسال كـ push لضمان عدم ضياع السجل وظهوره كفقاعات مرتبة
        db.ref('chats/' + userPhone).push({
            role: 'user',
            text: text,
            time: Date.now()
        }).then(() => {
            input.value = '';
        });
    }

    loadMessages();
</script>

</body>
</html>
