<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المحادثة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --pink: #880e4f; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #f0f0f0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--pink); color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.6; }
        .sent { align-self: flex-start; background: var(--pink); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-end; background: white; color: #333; border-bottom-left-radius: 2px; }
        .input-area { background: white; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 25px; outline: none; }
        button { background: var(--pink); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <header>المحادثة</header>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا...">
        <button onclick="send()">إرسال</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');
        const receiver = urlParams.get('receiver');
        const userPhone = localStorage.getItem('app_user_phone');

        const config = { databaseURL: "https://cosmetic-1980-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // قراءة الرسائل
        db.ref('messages/' + chatId).on('value', snap => {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                div.className = `msg ${m.sender === userPhone ? 'sent' : 'received'}`;
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
            
            // عند فتح المحادثة، نعتبر الرسائل مقروءة
            db.ref('chats/' + chatId).update({ unread: false });
        });

        function send() {
            const text = document.getElementById('msgInput').value;
            if(!text) return;
            const mRef = db.ref('messages/' + chatId).push();
            mRef.set({ sender: userPhone, text: text, time: Date.now() });
            
            // تحديث غرفة الدردشة للتنبيه
            db.ref('chats/' + chatId).update({
                lastMsg: text,
                receiver: receiver,
                unread: true,
                sender: userPhone
            });
            document.getElementById('msgInput').value = '';
        }
    </script>
</body>
</html>
