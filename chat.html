<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المحادثة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --pink: #880e4f; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #f0f0f0; display: flex; flex-direction: column; height: 100vh; padding-bottom: calc(72px + env(safe-area-inset-bottom)); }
        header { background: var(--pink); color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: calc(90px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 78%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; box-shadow: 0 6px 18px rgba(11,11,20,0.04); word-wrap: break-word; }
        .sent { align-self: flex-start; background: linear-gradient(135deg,var(--pink),#ad1457); color: white; border-bottom-right-radius: 6px; }
        .received { align-self: flex-end; background: #fff; color: #222; border-bottom-left-radius: 6px; }
        .input-area { background: white; padding: 10px; display: flex; gap: 10px; box-shadow: 0 -6px 20px rgba(0,0,0,0.06); position: fixed; left: 0; right: 0; bottom: 0; z-index: 1000; align-items: center; padding-left: 14px; padding-right: 14px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        input { flex: 1; border: 1px solid #eee; padding: 12px 14px; border-radius: 22px; outline: none; }
        .btn { border: none; border-radius: 12px; padding: 10px 14px; cursor: pointer; font-weight: 800; box-shadow: 0 8px 20px rgba(82,63,105,0.06); }
        .btn-primary { background: var(--pink); color: white; }
        .attach-btn { width:44px; height:44px; display:inline-flex; align-items:center; justify-content:center; border-radius:12px; background:#f5f5f7; }
    </style>
</head>
<body>
    <header>المحادثة</header>
    <div id="chatBox"></div>
    <div class="input-area">
        <label class="attach-btn" title="إرفاق صورة"><input id="attachFile" type="file" accept="image/*" style="display:none;"></label>
        <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا..." aria-label="حقل كتابة الرسالة">
        <button class="btn btn-primary" onclick="send()">إرسال</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');
        const receiver = urlParams.get('receiver');
        const userPhone = localStorage.getItem('app_user_phone');

        const config = { databaseURL: "https://cosmetic-1980-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // قراءة الرسائل
        db.ref('messages/' + chatId).on('value', snap => {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                div.className = `msg ${m.sender === userPhone ? 'sent' : 'received'}`;
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
            
            // عند فتح المحادثة، نعتبر الرسائل مقروءة
            db.ref('chats/' + chatId).update({ unread: false });
        });

        function send() {
            const text = document.getElementById('msgInput').value;
            if(!text) return;
            const mRef = db.ref('messages/' + chatId).push();
            mRef.set({ sender: userPhone, text: text, time: Date.now() });
            
            // تحديث غرفة الدردشة للتنبيه
            db.ref('chats/' + chatId).update({
                lastMsg: text,
                receiver: receiver,
                unread: true,
                sender: userPhone
            });
            document.getElementById('msgInput').value = '';
        }

        // Ensure chat scrolls to bottom when focusing input and on resize (helps mobile keyboard)
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        function scrollToBottomSoon() { setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 220); }
        msgInput.addEventListener('focus', scrollToBottomSoon);
        window.addEventListener('resize', scrollToBottomSoon);

        document.getElementById('attachFile').addEventListener('change', function(){ if(this.files && this.files[0]) { alert('اختيار ملف مبدئي - لم يتم رفعه (واجهة)'); } });
    </script>
</body>
</html>
